<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
        <title> difficulty</title>
        <style>
            body {
                background-color: #f1f5f9;
                background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
                background-size: 24px 24px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 40px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 100vh;
                justify-content: center;
                box-sizing: border-box;
                overflow: hidden;
            }
            .mode-box {
                background-color: #ffffff;
                max-width: 600px;
                width: 100%;
                padding: 50px 40px;
                border-radius: 12px;
                border-top: 6px solid #2563eb;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
                text-align: center;
                box-sizing: border-box;
                position: relative;
            }
            h1 {
                color: #0f172a;
                margin-bottom: 10px;
                font-size: 2em;
            }
            .subtitle {
                color: #64748b;
                margin-bottom: 40px;
                font-size: 1.05em;
            }
            .btn-wrapper {
                margin: 20px 0;
                position: relative;
                display: inline-block;
                width: 100%;
            }
            .mode-btn {
                width: 80%;
                padding: 16px;
                font-size: 1.2em;
                font-weight: bold;
                border-radius: 8px;
                cursor: pointer;
                border: none;
                color: white;
                transition: transform 0.1s, background-color 0.2s;
            }
            #easy-btn { background-color: #10b981; }
            #medium-btn { background-color: #f59e0b; }
            #hard-btn { background-color: #dc4444; }

            #easy-btn:hover { background-color: #059669;}
            #medium-btn:hover { background-color: #d97706;}
            #hard-btn:hover { background-color: #dc2626;}

            .bonus-label {
                font-size: 0.85em;
                color: #ef4444;
                font-weight: bold;
                margin-top: 6px;
                display: block;
            }
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(15, 23, 42, 0.6);
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 999999;
            }
            .modal-card {
                background-color: white;
                padding: 35px;
                border-radius: 10px;
                max-width: 400px;
                width: 90%;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
                text-align: center;
            }
            .modal-action {
                display: flex;
                gap: 15px;
                justify-content: center;
                margin-top: 25px;
            }
            .confirm-btn {
                background-color: #ef4444;
                color: white;
                border: none;
                padding: 10px 20px;
                font-weight: bold;
                border-radius: 4px;
                cursor: pointer;
            }
            .cancel-btn {
                background-color: #94a3b8;
                color: white;
                border: none;
                padding: 10px 20px;
                font-weight: bold;
                border-radius: 4px;
                cursor: pointer;;
            }
        </style>
    </head>
    <body>

        <div class="mode-box">
            <h1>select quiz mode</h1>
            <p class="subtitle">choose a difficulty</p>

            <div class="btn-wrapper" id="easy-wrapper">
                <button class="mode-btn" id="easy-btn" onclick="triggerEasyCrazy()">EASY MODE</button>
            </div>

            <div class="btn-wrapper" id="medium-wrapper">
                <button class="mode-btn" id="medium-btn" onclick="goToMedium()">MEDIUM MODE</button>
            </div>

            <div class="btn-wrapper" id="hard-warpper">
                <button class="mode-btn" id="hard-btn" onclick="openHardVerification()">HARD MODE</button>
                <span class="bonus-label">free +1 point</span>
            </div>
        </div>

        <div id="hard-modal" class="modal-overlay">
            <div class="modal-card">
                <h2 style="color: #ef4444; margin-top: 0;">are you sure?</h2>
                <p style="color: #475569; font-size: 1.05em; line-height: 1.5;">
                    Hard mode
                </p>
                <div class="modal-actions">
                    <button class="confirm-btn" onclick="goToHard()">yes, confirm</button>
                    <button class="cancel-btn" onclick="closeHardVerfication()">no, go back</button>
                </div>
            </div>
        </div>

        <script>

            history.pushState(null, null, location.href);
            window.onpopstate = function () { history.go(1); };

            let easyClickCount = 0;

            function triggerEasyCrazy() {
                const btn = document.getElementById("easy-btn");

                if (easyClickCount === 0) {
                    btn.style.position = 'fixed';
                    btn.style.zIndex = '9999999';
                    moveButtonRandomly(btn);
                    easyClickCount++;
                } else {
                    document.getElementById("easy-wrapper").style.display = 'none';
                }
            }

            function moveButtonRandomly(element) {
                const maxX = window.innerWidth - element.offsetWidth - 40;
                const maxY = window.innerHeight - element.offsetHeight - 40;

                const randomX = Math.max(20, Math.floor(Math.random() * maxX))
                const randomY = Math.max(20, Math.floor(Math.random() * maxY))

                element.style.left = randomX + 'px';
                element.style.top = randomY + 'px';
            }

            function goToMedium() { window.location.href = "quiz-medium.html"; }
            function openHardVerification() { document.getElementById("hard-modal").style.display = "flex"; }
            function closeHardVerfication() { document.getElementById("hard-modal").style.display = "none"; }
            function goToHard() { window.location.href = "quiz-hard.html"}

        </script>
    </body>
</html>
